<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — AeroVerse AI</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="scan"></div>

<!-- Full background aviation image -->
<div class="auth-bg" style="background-image:url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1920&q=85');"></div>
<div class="auth-ov"></div>

<!-- Floating particles -->
<div style="position:fixed;inset:0;z-index:1;pointer-events:none;" id="particles"></div>

<div class="auth-page">
  <div class="auth-panel">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">✈</div>
      <div>
        <div class="auth-logo-name">AEROVERSE AI</div>
        <div class="auth-logo-sub">SMART AIRPORT DIGITAL TWIN</div>
      </div>
    </div>

    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Sign in to access the Airport Command Center</div>

    <div class="auth-err" id="errMsg"></div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">Operator Name</label>
      <input class="form-control" type="text" id="nameInput" placeholder="Enter your name" autocomplete="username" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">Passcode</label>
      <div class="pass-wrap">
        <input class="form-control" type="password" id="passInput" placeholder="Enter your passcode" autocomplete="current-password">
        <button class="pass-toggle" type="button" onclick="togglePass()" id="passBtn">👁</button>
      </div>
      <div class="hint">Your passcode set during registration</div>
    </div>

    <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px;" onclick="doLogin()" id="loginBtn">
      <span id="btnLabel">Sign In to Command Center</span>
    </button>

    <div class="auth-switch">
      New operator? <a href="/register">Create an account →</a>
    </div>

    <!-- Features preview -->
    <div class="auth-feats">
      <div class="auth-feat"><div class="fdot"></div>AI Delay Predictor</div>
      <div class="auth-feat"><div class="fdot"></div>Live Aircraft Map</div>
      <div class="auth-feat"><div class="fdot"></div>Network Simulation</div>
      <div class="auth-feat"><div class="fdot"></div>Cyber Threat Monitor</div>
      <div class="auth-feat"><div class="fdot"></div>Real-time Analytics</div>
      <div class="auth-feat"><div class="fdot"></div>Weather Intelligence</div>
    </div>

  </div>
</div>

<script>
function togglePass(){
  const i=document.getElementById('passInput');
  const b=document.getElementById('passBtn');
  if(i.type==='password'){i.type='text';b.textContent='🙈';}
  else{i.type='password';b.textContent='👁';}
}

async function doLogin(){
  const name=document.getElementById('nameInput').value.trim();
  const pass=document.getElementById('passInput').value;
  const err=document.getElementById('errMsg');
  const btn=document.getElementById('btnLabel');
  err.style.display='none';

  if(!name||!pass){err.textContent='Please fill in all fields.';err.style.display='block';return;}

  btn.textContent='Authenticating…';
  document.getElementById('loginBtn').disabled=true;

  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,passcode:pass})});
    const d=await r.json();
    if(d.ok){
      btn.textContent='✓ Access Granted — Loading…';
      setTimeout(()=>{window.location.href='/';},600);
    } else {
      err.textContent=d.error||'Login failed.';err.style.display='block';
      btn.textContent='Sign In to Command Center';
      document.getElementById('loginBtn').disabled=false;
    }
  }catch(e){
    err.textContent='Connection error. Try again.';err.style.display='block';
    btn.textContent='Sign In to Command Center';
    document.getElementById('loginBtn').disabled=false;
  }
}

// Enter key
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// Floating particles
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    const sz=Math.random()*2+1;
    d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;background:rgba(56,189,248,${Math.random()*0.4+0.1});top:${Math.random()*100}%;left:${Math.random()*100}%;animation:floatP ${Math.random()*12+8}s linear infinite;animation-delay:-${Math.random()*12}s;`;
    c.appendChild(d);
  }
  const st=document.createElement('style');
  st.textContent=`@keyframes floatP{0%{transform:translateY(0) translateX(0);opacity:.4}50%{transform:translateY(-60px) translateX(20px);opacity:.8}100%{transform:translateY(0) translateX(0);opacity:.4}}`;
  document.head.appendChild(st);
})();
</script>
</body>
</html>
